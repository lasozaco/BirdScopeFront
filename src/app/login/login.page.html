<ion-content class="ion-padding" style="--background: var(--color-background);">
  <div class="min-h-full flex flex-col justify-center items-center py-10">
    <div class="w-full max-w-md bg-white p-8 rounded-[40px] shadow-sm border border-border">
      
      <!-- Logo -->
      <div class="flex justify-center mb-6">
        <img src="/assets/images/logo.png" alt="BirdScope Logo" class="w-24 h-24 object-contain hover:scale-105 transition-transform duration-300">
      </div>

      <!-- Title & Subtitle -->
      <div class="text-center mb-8">
        <h1 class="text-3xl font-headings font-bold text-foreground mb-2">Bienvenido a BirdScope</h1>
        <p class="text-foreground/70 text-sm">Explora, identifica y ayuda a conservar las especies de aves del Tolima</p>
      </div>

      <!-- Form -->
      <form class="flex flex-col gap-5">
        
        <!-- Email Input -->
        <div class="flex flex-col gap-2">
          <label class="text-sm font-bold text-foreground ml-1">Correo electrónico</label>
          <div class="flex items-center gap-3 px-4 py-3 border border-border rounded-full focus-within:border-primary focus-within:ring-1 focus-within:ring-primary transition-all">
            <iconify-icon icon="lucide:mail" class="text-foreground/60" style="font-size: 20px;"></iconify-icon>
            <input type="email" placeholder="Ingresa tu correo" class="w-full bg-transparent border-none outline-none text-foreground placeholder-foreground/50 text-base" />
          </div>
        </div>

        <!-- Password Input -->
        <div class="flex flex-col gap-2">
          <label class="text-sm font-bold text-foreground ml-1">Contraseña</label>
          <div class="flex items-center gap-3 px-4 py-3 border border-border rounded-full focus-within:border-primary focus-within:ring-1 focus-within:ring-primary transition-all">
            <iconify-icon icon="lucide:lock" class="text-foreground/60" style="font-size: 20px;"></iconify-icon>
            <input type="password" placeholder="••••••••" class="w-full bg-transparent border-none outline-none text-foreground placeholder-foreground/50 text-base" />
            <button type="button" class="flex items-center justify-center text-foreground/50 hover:text-foreground">
              <iconify-icon icon="lucide:eye-off" style="font-size: 20px;"></iconify-icon>
            </button>
          </div>
        </div>

        <!-- Options -->
        <div class="flex items-center justify-between text-sm mt-1">
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" class="w-5 h-5 accent-primary rounded cursor-pointer" checked />
            <span class="text-foreground/70">Recordarme</span>
          </label>
          <a href="#" class="font-medium text-secondary hover:underline">¿Olvidaste tu contraseña?</a>
        </div>

        <!-- Submit Button -->
        <button type="button" routerLink="/home" class="w-full py-4 mt-2 font-medium rounded-full bg-primary text-primary-foreground hover:bg-primary/90 transition-colors cursor-pointer text-lg">
          Iniciar sesión
        </button>

      </form>

      <!-- Divider -->
      <div class="flex items-center gap-4 my-8">
        <hr class="flex-1 border-border" />
        <span class="text-sm text-foreground/60 font-medium">O continúa con</span>
        <hr class="flex-1 border-border" />
      </div>

      <!-- Social Login -->
      <div class="flex flex-col gap-3">
        <button type="button" class="w-full py-3.5 flex items-center justify-center gap-2 rounded-full border border-border bg-white text-foreground hover:bg-background transition-colors cursor-pointer font-medium">
          <iconify-icon icon="logos:google-icon" style="font-size: 20px;"></iconify-icon>
          Ingresar con Google
        </button>
        <button type="button" class="w-full py-3.5 flex items-center justify-center gap-2 rounded-full border border-border bg-white text-foreground hover:bg-background transition-colors cursor-pointer font-medium">
          <iconify-icon icon="logos:microsoft-icon" style="font-size: 20px;"></iconify-icon>
          Ingresar con Microsoft
        </button>
      </div>

      <!-- Footer -->
      <p class="text-center text-sm text-foreground/70 mt-8">
        ¿No tienes una cuenta? <a href="#" class="font-bold text-primary hover:underline">Registrarse</a>
      </p>

    </div>
  </div>
</ion-content>
